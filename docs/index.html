<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源组监测 - ziyuanzu.com 资源站实时监控</title>
<meta http-equiv="refresh" content="3600">
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --ink: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; padding: 2rem; }
  h1 { font-size: 2rem; color: var(--accent); margin-bottom: 1rem; }
  p { color: var(--muted); font-size: 1rem; }
  .loading { margin-top: 2rem; font-size: 1.2rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>
<div class="container">
  <h1>资源组监测</h1>
  <p>ziyuanzu.com 资源站实时监控面板</p>
  <div class="loading">等待首次监测数据...</div>
  <p style="margin-top:1rem; font-size:0.85rem;">GitHub Actions 工作流将自动运行并生成监控数据</p>
</div>
</body>
</html>
